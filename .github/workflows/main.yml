name: macOS 14 RDP via Tailscale (Sonoma Bypass)

on:
  workflow_dispatch:

jobs:
  mac-rdp:
    runs-on: macos-14 # Wapas tumhari pasand ka Mac 14!
    timeout-minutes: 360

    steps:
      - name: Install Tailscale
        run: brew install tailscale

      - name: Start Tailscale daemon
        run: |
          sudo tailscaled \
            --state=/tmp/tailscaled.state \
            --socket=/tmp/tailscaled.sock \
            > /tmp/tailscaled.log 2>&1 &
          sleep 8

      - name: Connect to Tailscale
        run: |
          sudo tailscale --socket=/tmp/tailscaled.sock up \
            --authkey="${{ secrets.TAILSCALE_AUTHKEY }}" \
            --hostname="mac-runner-${{ github.run_id }}" \
            --accept-routes
          sleep 5

      - name: macOS 14 Security Bypass & Force VNC
        run: |
          echo "macOS 14 (Sonoma) ki security bypass kar rahe hain..."
          
          # 1. Naya user (macrdp) ban banana
          sudo sysadminctl -addUser macrdp -fullName "Mac RDP" -password "12345678" -admin
          sudo dseditgroup -o edit -a macrdp -t user admin
          
          # 2. Apple ke TCC Database me zabardasti Screen Recording permissions inject karna
          sudo sqlite3 /Library/Application\ Support/com.apple.TCC/TCC.db "INSERT OR REPLACE INTO access VALUES('kTCCServiceScreenCapture','com.apple.screensharing.agent',0,2,4,1,NULL,NULL,0,'XPO',NULL,0,NULL);" || true
          sudo sqlite3 /Library/Application\ Support/com.apple.TCC/TCC.db "INSERT OR REPLACE INTO access VALUES('kTCCServiceAccessibility','com.apple.screensharing.agent',0,2,4,1,NULL,NULL,0,'XPO',NULL,0,NULL);" || true
          
          # 3. VNC ko legacy password (12345678) ke sath start karna
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "12345678" \
            -restart -agent -privs -all
          
          # 4. macOS 14 mein Service ko background se explicitly force ON karna
          sudo launchctl enable system/com.apple.screensharing
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          
          sleep 5

      - name: 🟢 PRINT CONNECTION DETAILS 🟢
        run: |
          TAILSCALE_IP=$(sudo tailscale --socket=/tmp/tailscaled.sock ip -4)
          echo "============================================"
          echo "  🍎 MAC RDP READY (macOS 14 SONOMA FIX) 🍎"
          echo "============================================"
          echo "  🌐 VNC IP       : $TAILSCALE_IP"
          echo "  👤 Username     : macrdp"
          echo "  🔑 Password     : 12345678"
          echo "============================================"

      - name: Keep Session Alive
        run: |
          while true; do sleep 60; done
