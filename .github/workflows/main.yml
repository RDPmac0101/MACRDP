name: macOS RDP via Tailscale

on:
  workflow_dispatch:

jobs:
  mac-rdp:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:

      - name: Install Tailscale
        run: brew install tailscale

      - name: Start Tailscale daemon
        run: |
          sudo tailscaled \
            --state=/tmp/tailscaled.state \
            --socket=/tmp/tailscaled.sock \
            > /tmp/tailscaled.log 2>&1 &
          sleep 8
          echo "Daemon started"

      - name: Connect to Tailscale via OAuth
        run: |
          echo "Step 1: Getting OAuth access token..."
          ACCESS_TOKEN=$(curl -s \
            -X POST \
            -d "client_id=${{ secrets.TS_OAUTH_CLIENT_ID }}&client_secret=${{ secrets.TS_OAUTH_CLIENT_SECRET }}&grant_type=client_credentials" \
            "https://api.tailscale.com/api/v2/oauth/token" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          echo "Step 2: Creating auth key using access token..."
          AUTH_KEY=$(curl -s \
            -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"capabilities":{"devices":{"create":{"reusable":false,"ephemeral":true,"preauthorized":true}}},"expirySeconds":300}' \
            "https://api.tailscale.com/api/v2/tailnet/-/keys" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])")

          echo "Step 3: Connecting to Tailscale..."
          sudo tailscale --socket=/tmp/tailscaled.sock up \
            --authkey="$AUTH_KEY" \
            --hostname="mac-runner-${{ github.run_id }}" \
            --accept-routes
          sleep 5
          echo "Connected!"

      - name: Enable VNC Screen Sharing
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "MacRDP@1234" \
            -restart -agent -privs -all
          sleep 3

      - name: Print Connection Details
        run: |
          TAILSCALE_IP=$(sudo tailscale --socket=/tmp/tailscaled.sock ip -4)
          echo "============================================"
          echo "  MAC RDP READY!"
          echo "============================================"
          echo "  VNC IP       : $TAILSCALE_IP"
          echo "  Port         : 5900"
          echo "  VNC Password : MacRDP@1234"
          echo "============================================"

      - name: Keep Session Alive
        run: |
          while true; do
            sleep 60
            echo "Session alive - $(date)"
          done
