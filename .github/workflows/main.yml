name: macOS 14 RDP (Default User Fix)

on:
  workflow_dispatch:

jobs:
  mac-rdp:
    runs-on: macos-14
    timeout-minutes: 360

    steps:
      - name: Install Tailscale
        run: brew install tailscale

      - name: Start Tailscale daemon
        run: |
          sudo tailscaled \
            --state=/tmp/tailscaled.state \
            --socket=/tmp/tailscaled.sock \
            > /tmp/tailscaled.log 2>&1 &
          sleep 8

      - name: Connect to Tailscale
        run: |
          sudo tailscale --socket=/tmp/tailscaled.sock up \
            --authkey="${{ secrets.TAILSCALE_AUTHKEY }}" \
            --hostname="mac-runner-${{ github.run_id }}" \
            --accept-routes
          sleep 5

      - name: Enable VNC (Without changing Mac Password)
        run: |
          echo "Mac ka password nahi badal rahe, sirf VNC ka set kar rahe hain..."
          
          # Sirf VNC service ko ON karna aur uska internal password set karna
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "12345678" \
            -restart -agent -privs -all
            
          sleep 5

      - name: 🟢 PRINT CONNECTION DETAILS 🟢
        run: |
          TAILSCALE_IP=$(sudo tailscale --socket=/tmp/tailscaled.sock ip -4)
          echo "============================================"
          echo "  🍎 MAC RDP READY (DEFAULT RUNNER) 🍎"
          echo "============================================"
          echo "  🌐 VNC IP       : $TAILSCALE_IP"
          echo "  👤 Username     : runner (Ya khali chhod do)"
          echo "  🔑 VNC Password : 12345678"
          echo "============================================"

      - name: Keep GUI Alive (Prevent Black Screen)
        run: |
          echo "Display ko awake rakhne wala loop chalu hai..."
          while true; do
            # Ye command headless Mac ko screen render karne pe majboor karti hai
            sudo screencapture -x /tmp/awake.png > /dev/null 2>&1 || true
            sleep 30
          done
