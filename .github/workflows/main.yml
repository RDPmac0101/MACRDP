name: macOS 14 RDP via Tailscale

on:
  workflow_dispatch:

jobs:
  mac-rdp:
    runs-on: macos-14
    timeout-minutes: 360

    steps:

      - name: Install Tailscale
        run: brew install tailscale

      - name: Start Tailscale daemon
        run: |
          sudo tailscaled \
            --state=/tmp/tailscaled.state \
            --socket=/tmp/tailscaled.sock \
            > /tmp/tailscaled.log 2>&1 &
          sleep 8

      - name: Connect to Tailscale
        run: |
          sudo tailscale --socket=/tmp/tailscaled.sock up \
            --authkey="${{ secrets.TAILSCALE_AUTHKEY }}" \
            --hostname="mac-runner-${{ github.run_id }}" \
            --accept-routes
          sleep 5

      - name: Install displayplacer (Virtual Display Fix)
        run: |
          brew install jakehilborn/jakehilborn/displayplacer

      - name: Create Virtual Display & Fix Black Screen
        run: |
          echo "Virtual display bana rahe hain..."

          # WindowServer ko kick karo
          sudo launchctl kickstart -k system/com.apple.WindowServer || true
          sleep 3

          # Virtual display resolution set karo
          displayplacer "res:1920x1080 hz:60 color_depth:8 enabled:true scaling:off origin:(0,0) degree:0" || true
          sleep 2

          # Display ko wake karo
          sudo screencapture -x /tmp/display_wake.png || true

          echo "Virtual display ready!"

      - name: Create User & Enable VNC
        run: |
          # User banana
          sudo sysadminctl -addUser macrdp -fullName "Mac RDP" -password "12345678" -admin || true
          sudo dseditgroup -o edit -a macrdp -t user admin || true

          # TCC permissions
          sudo sqlite3 /Library/Application\ Support/com.apple.TCC/TCC.db \
            "INSERT OR REPLACE INTO access VALUES('kTCCServiceScreenCapture','com.apple.screensharing.agent',0,2,4,1,NULL,NULL,0,'XPO',NULL,0,NULL);" || true

          # Firewall OFF
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off

          # VNC enable
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "12345678" \
            -restart -agent -privs -all

          # Screensharing service force ON
          sudo launchctl enable system/com.apple.screensharing
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist || true

          sleep 5

          # Confirm port 5900 chal raha hai
          echo "Port check:"
          sudo lsof -i :5900 || echo "Port 5900 nahi mila!"

      - name: Print Connection Details
        run: |
          TAILSCALE_IP=$(sudo tailscale --socket=/tmp/tailscaled.sock ip -4)
          echo "============================================"
          echo "  MAC RDP READY!"
          echo "============================================"
          echo "  VNC IP   : $TAILSCALE_IP"
          echo "  Username : macrdp"
          echo "  Password : 12345678"
          echo "  Port     : 5900"
          echo "============================================"

      - name: Keep Session Alive
        run: |
          # Har minute display refresh karo taaki black na aaye
          while true; do
            sudo screencapture -x /tmp/keep_alive.png || true
            sleep 60
            echo "alive - $(date)"
          done
