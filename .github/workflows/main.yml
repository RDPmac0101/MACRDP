name: macOS RDP via Tailscale

on:
  workflow_dispatch: # Isse tum manual start kar paoge

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Setup Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

    - name: Enable Screen Sharing (VNC) and Set Password
      run: |
        echo "Setting up VNC and User Password..."
        # Yahan hum 'runner' (macOS user) ka password 'MacRDP@1234' set kar rahe hain
        sudo dscl . -passwd /Users/runner "MacRDP@1234"
        
        # Mac mein VNC Screen Sharing ON kar rahe hain aur RealVNC ke liye set kar rahe hain
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -clientopts -setvnclegacy -vnclegacy yes -clientopts -setvncpw -vncpw "MacRDP@1234" -restart -agent -privs -all

    - name: 🟢 PRINT CONNECTION DETAILS 🟢
      run: |
        echo "======================================================"
        echo "🍎 TUMHARA MAC RDP CONNECT HONE KE LIYE READY HAI! 🍎"
        echo "======================================================"
        echo "🌐 RealVNC IP Address : $(tailscale ip -4)"
        echo "👤 Username           : runner"
        echo "🔑 Password           : MacRDP@1234"
        echo "======================================================"
        echo "Bhai, upar diya gaya IP address RealVNC Viewer mein dalo aur connect karo!"

    - name: Keep RDP Alive (Running)
      run: |
        echo "Mac chal raha hai... Is step ko cancel mat karna warna PC band ho jayega."
        while true; do sleep 60; done
