name: macOS RDP via Tailscale

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Install and Setup Tailscale Manually (macOS Fix)
      run: |
        echo "Tailscale install ho raha hai..."
        # Mac par Tailscale manually install kar rahe hain
        brew install tailscale
        
        # Tailscale ko background mein start kar rahe hain
        sudo tailscaled > /dev/null 2>&1 &
        sleep 10
        
        # Tumhari Auth Key se connect kar rahe hain
        sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=mac-rdp-runner

    - name: Configure VNC (Password Fix)
      run: |
        echo "VNC Server setup ho raha hai..."
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
        -activate -configure -access -on \
        -clientopts -setvnclegacy -vnclegacy yes \
        -clientopts -setvncpw -vncpw "MacRDP@1234" \
        -restart -agent -privs -all

    - name: 🟢 PRINT CONNECTION DETAILS 🟢
      run: |
        echo "======================================================"
        echo "🍎 MAC RDP READY! ALL ERRORS FIXED 🍎"
        echo "======================================================"
        echo "🌐 RealVNC IP Address : $(tailscale ip -4)"
        echo "👤 Username           : runner"
        echo "🔑 VNC Password       : MacRDP@1234"
        echo "======================================================"
        echo "Bhai jaldi se upar wala IP daalo aur connect karo!"

    - name: Keep RDP Alive
      run: |
        echo "RDP chal raha hai... jab tak use karna hai isko band mat karna."
        while true; do sleep 60; done
