name: macOS RDP via Tailscale (Fixed)

on: 
  workflow_dispatch:

jobs:
  mac-rdp:
    runs-on: macos-13  # Bahi, hum macOS 13 use kar rahe hain taaki security errors bypass ho jayein!
    timeout-minutes: 360  # RDP 6 ghante tak chalega

    steps:
      - name: Install Tailscale Manually (Fixing Linux-only error)
        # Bahi hum manual install kar rahe hain, action use nahi kar rahe
        run: brew install tailscale

      - name: Start Tailscale Daemon
        # Background mein Tailscale chalu karte hain socket aur state files define karke
        run: |
          sudo tailscaled \
            --state=/tmp/tailscaled.state \
            --socket=/tmp/tailscaled.sock \
            > /tmp/tailscaled.log 2>&1 &
          sleep 8

      - name: Connect to Tailscale (Requires TAILSCALE_AUTHKEY Secret)
        # Yahan hum GitHub Secret 'TAILSCALE_AUTHKEY' use kar rahe hain
        run: |
          sudo tailscale --socket=/tmp/tailscaled.sock up \
            --authkey="${{ secrets.TAILSCALE_AUTHKEY }}" \
            --hostname="mac-rdp-runner" \
            --accept-routes
          sleep 5

      - name: Create New RDP User (Fixing password permission errors)
        # Bahi hum ek naya user banayenge taaki permission error na aaye
        run: |
          echo "Naya user bana rahe hain rdpuser/12345678"
          sudo sysadminctl -addUser rdpuser -fullName "RDP User" -password "12345678" -admin
          
          # VNC Access is user ko permission allow kar rahe hain
          sudo dseditgroup -o edit -a rdpuser -t user com.apple.access_screensharing

      - name: Enable Screen Sharing (VNC) & Force Start
        # VNC ko chalu karne ki command, force restart ke sath
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -allowAccessFor -specifiedUsers \
            -restart -agent -privs -all \
            -clientopts -setvncpw -vncpw "12345678"
          sleep 5

      - name: 🟢 PRINT CONNECTION DETAILS 🟢
        # Logs mein connection info print karega. Bada green point logs ke end mein dhoondo.
        run: |
          TAILSCALE_IP=$(sudo tailscale --socket=/tmp/tailscaled.sock ip -4)
          echo "====================================================="
          echo "🍎 MAC RDP READY TO CONNECT! 🍎"
          echo "====================================================="
          echo "🌐 VNC IP Address : $TAILSCALE_IP"
          echo "🌐 Port           : 5900"
          echo "👤 Username       : rdpuser"
          echo "🔑 Password       : 12345678"
          echo "====================================================="
          echo "Tip: Connect se pehle RealVNC mein picture quality 'Auto' ya 'Low' rakhein."

      - name: Keep Session Alive (6 Hours)
        # RDP window ko khula rakhne ke liye infinite loop
        run: |
          echo "RDP up and running... Connect now!"
          while true; do sleep 60; done
