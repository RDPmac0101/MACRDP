name: macOS RDP via Tailscale

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Setup Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

    - name: Configure VNC (No Password Error Fix)
      run: |
        echo "Configuring VNC Server..."
        
        # VNC Password set karne ka naya aur safe tareeqa
        # Password yahan 'MacRDP@1234' hai
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
        -activate -configure -access -on \
        -clientopts -setvnclegacy -vnclegacy yes \
        -clientopts -setvncpw -vncpw "MacRDP@1234" \
        -restart -agent -privs -all

    - name: 🟢 PRINT CONNECTION DETAILS 🟢
      run: |
        echo "======================================================"
        echo "🍎 MAC RDP READY! ERROR FIXED 🍎"
        echo "======================================================"
        echo "🌐 RealVNC IP Address : $(tailscale ip -4)"
        echo "👤 Username           : runner"
        echo "🔑 VNC Password       : MacRDP@1234"
        echo "======================================================"
        echo "Tip: Agar Username maange toh 'runner' daal dena ya khali chhod dena."

    - name: Keep RDP Alive
      run: |
        echo "RDP Chal raha hai... Isse band mat hone dena."
        while true; do sleep 60; done
