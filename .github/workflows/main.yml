name: macOS RDP via Tailscale

on:
  workflow_dispatch:

jobs:
  mac-rdp:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Install Tailscale
        run: brew install tailscale

      - name: Start Tailscale daemon
        run: |
          sudo tailscaled \
            --state=/tmp/tailscaled.state \
            --socket=/tmp/tailscaled.sock \
            > /tmp/tailscaled.log 2>&1 &
          sleep 8
          echo "Tailscale Daemon started"

      - name: Connect to Tailscale
        run: |
          echo "Connecting to Tailscale..."
          sudo tailscale --socket=/tmp/tailscaled.sock up \
            --authkey="${{ secrets.TAILSCALE_AUTHKEY }}" \
            --hostname="mac-runner-${{ github.run_id }}" \
            --accept-routes
          sleep 5
          echo "Connected to Tailscale!"

      - name: Enable VNC Screen Sharing (8-Digit Password Fix)
        run: |
          echo "Configuring VNC with strict 8-character password..."
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "12345678" \
            -restart -agent -privs -all
          sleep 3

      - name: 🟢 PRINT CONNECTION DETAILS 🟢
        run: |
          TAILSCALE_IP=$(sudo tailscale --socket=/tmp/tailscaled.sock ip -4)
          echo "============================================"
          echo "  🍎 MAC RDP READY! 🍎"
          echo "============================================"
          echo "  🌐 VNC IP       : $TAILSCALE_IP"
          echo "  🔑 VNC Password : 12345678"
          echo "============================================"
          echo "TIPS FOR REALVNC VIEWER:"
          echo "1. IP Address mein upar wala IP daalein."
          echo "2. Agar Username maange, toh box khali chhod dein."
          echo "3. Password mein 12345678 daalein."

      - name: Keep Session Alive
        run: |
          echo "RDP Session chal raha hai... Isko band mat karna."
          while true; do
            sleep 60
          done
