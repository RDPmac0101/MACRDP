name: macOS RDP via Tailscale (Black Screen Fix)

on:
  workflow_dispatch:

jobs:
  mac-rdp:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Install Tailscale
        run: brew install tailscale

      - name: Start Tailscale daemon
        run: |
          sudo tailscaled \
            --state=/tmp/tailscaled.state \
            --socket=/tmp/tailscaled.sock \
            > /tmp/tailscaled.log 2>&1 &
          sleep 8

      - name: Connect to Tailscale
        run: |
          sudo tailscale --socket=/tmp/tailscaled.sock up \
            --authkey="${{ secrets.TAILSCALE_AUTHKEY }}" \
            --hostname="mac-runner-${{ github.run_id }}" \
            --accept-routes
          sleep 5

      - name: Fix Black Screen & Enable VNC
        run: |
          echo "Screen render issue ko fix kar rahe hain..."
          
          # 1. Mac Ke Default 'runner' User Ka Password Override Karo bina purane ke
          # Isse permission ya old password mismatch nahi hoga
          sudo passwd -u runner
          sudo sysadminctl -secureTokenOn runner -password "12345678" || true
          
          # 2. VNC and Remote Management service ko configure karo completely
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "12345678" \
            -restart -agent -privs -all
          
          # 3. Headless graphics simulation rule run karo (Force Display Render)
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement HostName $(tailscale --socket=/tmp/tailscaled.sock ip -4)
          
          sleep 5

      - name: 🟢 PRINT CONNECTION DETAILS 🟢
        run: |
          TAILSCALE_IP=$(sudo tailscale --socket=/tmp/tailscaled.sock ip -4)
          echo "============================================"
          echo "  🍎 MAC RDP READY (GUI RENDER FIXED) 🍎"
          echo "============================================"
          echo "  🌐 VNC IP       : $TAILSCALE_IP"
          echo "  👤 Username     : runner"
          echo "  🔑 Password     : 12345678"
          echo "============================================"
          echo "TIPS:"
          echo "RealVNC mein login details aane par Username 'runner' aur Password '12345678' dalein."

      - name: Keep Session Alive
        run: |
          while true; do sleep 60; done
