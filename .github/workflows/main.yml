name: macOS RDP via Tailscale

on:
  workflow_dispatch:

jobs:
  mac-rdp:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Install Tailscale
        run: brew install tailscale

      - name: Start tailscaled daemon
        run: |
          sudo tailscaled \
            --state=/tmp/tailscaled.state \
            --socket=/tmp/tailscaled.sock \
            > /tmp/tailscaled.log 2>&1 &
          sleep 8

      - name: Connect to Tailscale via OAuth
        run: |
          # Get a short-lived auth key using your OAuth client
          TOKEN=$(curl -s \
            -d "client_id=${{ secrets.TS_OAUTH_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.TS_OAUTH_CLIENT_SECRET }}" \
            -d "grant_type=client_credentials" \
            "https://api.tailscale.com/api/v2/oauth/token" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          sudo tailscale --socket=/tmp/tailscaled.sock up \
            --authkey="$TOKEN" \
            --hostname="mac-runner-${{ github.run_id }}" \
            --accept-routes \
            --ssh
          sleep 5

      - name: Enable VNC Screen Sharing
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "MacRDP@1234" \
            -restart -agent -privs -all
          sleep 3

      - name: Print Connection Details
        run: |
          TAILSCALE_IP=$(sudo tailscale --socket=/tmp/tailscaled.sock ip -4)
          echo "============================================"
          echo "  MAC RDP READY!"
          echo "============================================"
          echo "  VNC IP       : $TAILSCALE_IP"
          echo "  Port         : 5900"
          echo "  Username     : runner"
          echo "  VNC Password : MacRDP@1234"
          echo "============================================"
          echo "  Connect from RealVNC or any VNC client"
          echo "  Address format: $TAILSCALE_IP:5900"

      - name: Keep Session Alive
        run: |
          while true; do
            sleep 60
            echo "[$(date)] Session alive..."
          done
